---
# Garak v0.11+ scan profile — Clinical AI Gateway (MedSecLab)
# Requires model_type / model_name (target_type was renamed in v0.11)
#
# Run:
#   python3 -m garak --config garak/configs/clinical-ai-gateway.yaml
# Or:
#   ./scripts/run_garak.sh

system:
  verbose: 1
  narrow_output: false

run:
  seed: 42
  deprefix: true
  eval_threshold: 0.5
  generations: 3
  probe_tags: ""

reporting:
  report_prefix: ""

plugins:
  model_type: rest
  model_name: clinical-ai-gateway
  probe_spec: "promptinject,encoding,dan,leakreplay"
  detector_spec: auto
  extended_detectors: false

  generators:
    rest:
      RestGenerator:
        name: clinical-ai-gateway
        uri: "http://localhost:8000/query"
        method: post
        headers:
          Content-Type: application/json
        req_template_json_object:
          query: "$INPUT"
          user_id: garak-scanner
          session_id: garak-session
        response_json: true
        response_json_field: "$.answer"
        request_timeout: 120
        ratelimit_codes: [429]
        skip_codes: [400]
